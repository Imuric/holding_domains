<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Secured | Private Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .fade-in {
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-white dark:bg-slate-950 text-slate-800 dark:text-slate-400 flex flex-col items-center justify-center min-h-screen antialiased p-6">

    <!-- Theme Toggle -->
    <button id="theme-toggle" class="fixed top-6 right-6 p-2 rounded-lg bg-slate-100 dark:bg-slate-900 text-slate-500 dark:text-slate-400 hover:ring-2 ring-slate-200 dark:ring-slate-800 transition-all focus:outline-none" aria-label="Toggle Theme">
        <svg id="sun-icon" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
        </svg>
        <svg id="moon-icon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
    </button>

    <div class="max-w-md w-full text-center fade-in">
        <!-- Security Icon -->
        <div class="mb-8 inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-50 dark:bg-slate-900 text-slate-300 dark:text-slate-700">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        </div>

        <!-- Main Content -->
        <h1 class="text-xl font-semibold tracking-tight text-slate-900 dark:text-slate-100 mb-4">
            Domain Secured
        </h1>
        
        <div class="space-y-4">
            <p class="text-sm text-slate-500 dark:text-slate-500 leading-relaxed font-light">
                This domain is currently under private management.<br>
                It is <span class="font-medium text-slate-800 dark:text-slate-300">not available</span> for sale or transfer.
            </p>
        </div>

        <!-- Status Badge -->
        <div class="mt-12">
            <span class="inline-block px-4 py-1 text-[10px] font-bold tracking-[0.15em] uppercase bg-slate-50 dark:bg-slate-900/50 text-slate-400 dark:text-slate-600 rounded border border-slate-100 dark:border-slate-800/50">
                Private Holding
            </span>
        </div>

        <!-- Footer -->
        <footer class="mt-16 text-slate-300 dark:text-slate-800 text-[10px] tracking-widest uppercase">
            &copy; <span id="year"></span> Registry
        </footer>
    </div>

    <script>
        // Set current year
        document.getElementById('year').textContent = new Date().getFullYear();

        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;

        // Check for saved preference
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
        }

        themeToggle.addEventListener('click', () => {
            if (htmlElement.classList.contains('dark')) {
                htmlElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                htmlElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>

</body>
</html>
