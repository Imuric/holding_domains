<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Secured | Private Registry</title>
    <!-- Tailwind CSS for modern, clean styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdfdfd;
        }

        /* Subtle fade-in animation */
        .fade-in {
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen text-slate-800 antialiased p-6">

    <div class="max-w-md w-full text-center fade-in">
        <!-- Security Icon (Shield) -->
        <div class="mb-8 inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-100 text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        </div>

        <!-- Main Content -->
        <h1 class="text-2xl font-semibold tracking-tight text-slate-900 mb-4">
            Domain Secured
        </h1>
        
        <div class="space-y-4">
            <p class="text-slate-500 leading-relaxed font-light">
                This domain is currently under private management and is being held for internal project development.
            </p>
            
            <p class="text-slate-500 leading-relaxed font-light">
                It is <span class="font-medium text-slate-700">not available</span> for sale, lease, or transfer at this time.
            </p>
        </div>

        <!-- Status Badge -->
        <div class="mt-12">
            <span class="inline-block px-4 py-1 text-[10px] font-bold tracking-[0.1em] uppercase bg-slate-100 text-slate-500 rounded-full border border-slate-200">
                Private Holding • Status: Reserved
            </span>
        </div>

        <!-- Footer / Simple Timestamp (Optional) -->
        <footer class="mt-16 text-slate-300 text-xs">
            &copy; <span id="year"></span> Registry Operations. All Rights Reserved.
        </footer>
    </div>

    <script>
        // Automatically set current year
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>

</body>
</html>
